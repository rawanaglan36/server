version: '3.8'

services:
  backend:
    image: rawan36/dana_backend:latest    
    container_name: dana_backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - dana_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dana_redis
    ports:
      - "6379:6379"
    networks:
      - dana_network
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: dana_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=dana_app
    networks:
      - dana_network
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - dana_network
    restart: unless-stopped

networks:
  dana_network:
    driver: bridge

volumes:
  redis_data:
  mongodb_data: